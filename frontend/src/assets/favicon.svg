<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 540" fill="none">
  <defs>
    <!-- Outer glow for the lemon -->
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Lemon body gradient (vibrant yellow-amber) -->
    <linearGradient id="lemonBody" x1="10%" y1="10%" x2="90%" y2="90%">
      <stop offset="0%" stop-color="#fffbeb" /> <!-- Very light yellow highlight -->
      <stop offset="25%" stop-color="#fef08a" /> <!-- Soft yellow -->
      <stop offset="65%" stop-color="#fbbf24" /> <!-- Vivid yellow -->
      <stop offset="100%" stop-color="#d97706" /> <!-- Deep amber -->
    </linearGradient>

    <!-- Leaf gradient (emerald) -->
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>
  </defs>

  <g transform="translate(16, 24)">
    <!-- Glow layer behind the lemon -->
    <path d="M 220,120 C 120,160 110,290 200,360 C 290,430 390,360 400,240 C 410,120 320,80 220,120 Z" 
          fill="#fbbf24" opacity="0.18" filter="url(#neonGlow)" />

    <!-- Main Lemon Body (stylized egg/lemon path, rotated slightly) -->
    <path d="M 220,120 
             C 120,160 110,290 200,360 
             C 290,430 390,360 400,240 
             C 410,120 320,80 220,120 Z" 
          fill="url(#lemonBody)" 
          stroke="#0d0f14" 
          stroke-width="16" 
          stroke-linejoin="round" />

    <!-- Lemon tips (left bottom and right top) -->
    <!-- Right top tip/stem connection -->
    <path d="M 370,125 C 385,110 405,100 415,110 C 425,120 415,140 400,155" 
          stroke="#fbbf24" 
          stroke-width="12" 
          stroke-linecap="round" />

    <!-- Left bottom tip -->
    <path d="M 145,315 C 130,330 110,345 105,335 C 100,325 115,305 130,290" 
          stroke="#d97706" 
          stroke-width="12" 
          stroke-linecap="round" />

    <!-- Sleek Highlights -->
    <!-- Main Crescent Highlight -->
    <path d="M 170,220 C 190,160 250,130 310,140" 
          stroke="#ffffff" 
          stroke-width="14" 
          stroke-linecap="round" 
          opacity="0.6" />

    <!-- Shine Dot -->
    <circle cx="280" cy="180" r="14" fill="#ffffff" opacity="0.8" />

    <!-- Tiny Accent Line -->
    <path d="M 230,350 C 290,360 340,320 360,270" 
          stroke="#d97706" 
          stroke-width="8" 
          stroke-linecap="round" 
          opacity="0.5" />

    <!-- Stem and Leaves -->
    <!-- Small dark stem -->
    <path d="M 360,115 C 370,80 390,65 410,50" 
          stroke="#0d0f14" 
          stroke-width="16" 
          stroke-linecap="round" />

    <!-- Leaf 1 (Big emerald leaf) -->
    <path d="M 380,80 C 420,30 490,40 500,70 C 480,120 410,130 380,80 Z" 
          fill="url(#leafGrad)" 
          stroke="#0d0f14" 
          stroke-width="12" 
          stroke-linejoin="round" />

    <!-- Leaf 1 vein -->
    <path d="M 380,80 C 420,70 460,65 500,70" 
          stroke="#047857" 
          stroke-width="6" 
          stroke-linecap="round" />

    <!-- Leaf 2 (Small accent leaf pointing opposite) -->
    <path d="M 360,105 C 330,75 330,45 350,35 C 380,45 380,85 360,105 Z" 
          fill="#34d399" 
          stroke="#0d0f14" 
          stroke-width="8" 
          stroke-linejoin="round" />
  </g>
</svg>
