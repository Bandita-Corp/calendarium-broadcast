services:
  postgres:
    image: postgres:16-alpine
    container_name: lemon-seasons-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: lemon
      POSTGRES_PASSWORD: lemon_secret
      POSTGRES_DB: lemon_seasons
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
